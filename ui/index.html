<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Active Scan</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', 'Menlo', monospace;
  background: #0d1117;
  color: #e6edf3;
  min-height: 100vh;
}

.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 32px 24px;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  padding-bottom: 16px;
  border-bottom: 1px solid #30363d;
}

header h1 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.5px;
}

.badge {
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge.clean { background: #0d2818; color: #3fb950; border: 1px solid #238636; }
.badge.threat { background: #3d1117; color: #f85149; border: 1px solid #da3633; }
.badge.scanning { background: #1c1d2e; color: #58a6ff; border: 1px solid #1f6feb; }

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}

.stat-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 16px;
}

.stat-value {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 4px;
}

.stat-label {
  font-size: 12px;
  color: #7d8590;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.actions {
  margin-bottom: 32px;
}

.btn {
  background: #21262d;
  color: #c9d1d9;
  border: 1px solid #30363d;
  padding: 8px 16px;
  border-radius: 6px;
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: #30363d; }
.btn:active { background: #3a424b; }
.btn.primary { background: #1f6feb; color: #fff; border-color: #1f6feb; }
.btn.primary:hover { background: #388bfd; }

.section-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  color: #7d8590;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

thead th {
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid #30363d;
  color: #7d8590;
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

tbody td {
  padding: 8px 12px;
  border-bottom: 1px solid #21262d;
  vertical-align: top;
}

tbody tr:hover { background: #161b22; }

.cat-process { color: #f85149; }
.cat-network { color: #d29922; }
.cat-persistence { color: #a371f7; }
.cat-config { color: #58a6ff; }

.action-killed { color: #f85149; font-weight: 600; }
.action-notified { color: #d29922; }

.status-detected { color: #f85149; font-weight: 600; }
.status-resolved { color: #3fb950; font-weight: 600; }

.empty-state {
  text-align: center;
  padding: 48px 0;
  color: #484f58;
  font-size: 14px;
}

.history-container {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  overflow: hidden;
}

.toast-container {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: #3d1117;
  color: #f85149;
  border: 1px solid #da3633;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 13px;
  max-width: 400px;
  opacity: 0;
  transform: translateX(100%);
  transition: all 0.3s ease;
}
.toast.show {
  opacity: 1;
  transform: translateX(0);
}
.toast.resolved {
  background: #0d2818;
  color: #3fb950;
  border-color: #238636;
}

@media (max-width: 640px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Active Scan</h1>
    <span id="status-badge" class="badge clean">Starting...</span>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="scan-count">0</div>
      <div class="stat-label">Scans</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="alert-count">0</div>
      <div class="stat-label">Alerts</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="kill-count">0</div>
      <div class="stat-label">Kills</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="last-scan">--</div>
      <div class="stat-label">Last Scan</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn primary" id="scan-btn" onclick="triggerScan()">Scan Now</button>
  </div>

  <div class="section-title">Threat Events</div>
  <div class="history-container">
    <table>
      <thead>
        <tr>
          <th style="width:160px">Time</th>
          <th style="width:100px">Category</th>
          <th>Detail</th>
          <th style="width:80px">Action</th>
          <th style="width:80px">Status</th>
        </tr>
      </thead>
      <tbody id="history-body">
      </tbody>
    </table>
    <div id="empty-state" class="empty-state">No threats detected</div>
  </div>
</div>

<div id="toasts" class="toast-container"></div>

<script>
const badge = document.getElementById('status-badge');
const scanCount = document.getElementById('scan-count');
const alertCount = document.getElementById('alert-count');
const killCount = document.getElementById('kill-count');
const lastScan = document.getElementById('last-scan');
const historyBody = document.getElementById('history-body');
const emptyState = document.getElementById('empty-state');
const scanBtn = document.getElementById('scan-btn');

function renderStatus(data) {
  scanCount.textContent = data.scanCount || 0;
  alertCount.textContent = data.totalAlerts || 0;
  killCount.textContent = data.totalKills || 0;

  if (data.lastScan && data.lastScan !== '0001-01-01T00:00:00Z') {
    const ago = timeSince(new Date(data.lastScan));
    lastScan.textContent = ago;
  }

  if ((data.activeThreats || 0) > 0) {
    badge.textContent = data.activeThreats + ' Active';
    badge.className = 'badge threat';
  } else if ((data.scanCount || 0) > 0) {
    badge.textContent = 'Clean';
    badge.className = 'badge clean';
  } else {
    badge.textContent = 'Starting...';
    badge.className = 'badge scanning';
  }
}

function renderHistory(events) {
  if (!events || events.length === 0) {
    emptyState.style.display = 'block';
    historyBody.innerHTML = '';
    return;
  }

  emptyState.style.display = 'none';
  historyBody.innerHTML = events.map(d => {
    const time = new Date(d.time).toLocaleString();
    const catClass = 'cat-' + d.category;
    const actionClass = d.action === 'killed' ? 'action-killed' : 'action-notified';
    const statusClass = 'status-' + (d.status || 'detected');
    return `<tr>
      <td>${esc(time)}</td>
      <td class="${catClass}">${esc(d.category)}</td>
      <td>${esc(d.detail)}</td>
      <td class="${actionClass}">${esc(d.action)}</td>
      <td class="${statusClass}">${esc(d.status || 'detected')}</td>
    </tr>`;
  }).join('');
}

function timeSince(date) {
  const secs = Math.floor((Date.now() - date.getTime()) / 1000);
  if (secs < 5) return 'just now';
  if (secs < 60) return secs + 's ago';
  const mins = Math.floor(secs / 60);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  return hrs + 'h ago';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function showToast(message, style) {
  const container = document.getElementById('toasts');
  const toast = document.createElement('div');
  toast.className = 'toast' + (style ? ' ' + style : '');
  toast.textContent = message;
  container.appendChild(toast);
  requestAnimationFrame(() => toast.classList.add('show'));
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 5000);
}

async function triggerScan() {
  scanBtn.disabled = true;
  scanBtn.textContent = 'Scanning...';
  badge.textContent = 'Scanning';
  badge.className = 'badge scanning';
  try {
    await fetch('/api/scan', { method: 'POST' });
  } finally {
    setTimeout(() => {
      scanBtn.disabled = false;
      scanBtn.textContent = 'Scan Now';
    }, 2000);
  }
}

async function fetchHistory() {
  try {
    const res = await fetch('/api/threats');
    const data = await res.json();
    renderHistory(data);
  } catch {}
}

// --- SSE ---
let es;
function connect() {
  es = new EventSource('/api/events');

  es.addEventListener('status', (e) => {
    try {
      renderStatus(JSON.parse(e.data));
    } catch {}
    fetchHistory();
  });

  es.addEventListener('detection', (e) => {
    try {
      const d = JSON.parse(e.data);
      showToast(d.category + ': ' + d.detail);
    } catch {}
  });

  es.addEventListener('resolved', (e) => {
    try {
      const d = JSON.parse(e.data);
      showToast('Resolved: ' + d.detail, 'resolved');
    } catch {}
    fetchHistory();
  });

  es.onerror = () => {
    es.close();
    setTimeout(connect, 3000);
  };
}

// --- Init ---
async function init() {
  try {
    const res = await fetch('/api/status');
    renderStatus(await res.json());
  } catch {}
  await fetchHistory();
  connect();
  // Refresh last-scan timer every second
  setInterval(() => {
    const el = document.getElementById('last-scan');
    if (el._lastScanDate) {
      el.textContent = timeSince(el._lastScanDate);
    }
  }, 1000);
}

// Patch renderStatus to track the actual date for live countdown
const _origRenderStatus = renderStatus;
renderStatus = function(data) {
  _origRenderStatus(data);
  if (data.lastScan && data.lastScan !== '0001-01-01T00:00:00Z') {
    lastScan._lastScanDate = new Date(data.lastScan);
  }
};

init();
</script>
</body>
</html>
